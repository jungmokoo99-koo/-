name: 한경 글로벌마켓 일일 요약

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: |
          pip install yt-dlp youtube-transcript-api anthropic requests

      - name: 요약 스크립트 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python summarize.py

      - name: 요약 결과 저장
        uses: actions/upload-artifact@v4
        with:
          name: 요약-${{ github.run_id }}
          path: summary_*.txt
          retention-days: 30
